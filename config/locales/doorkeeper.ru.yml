        credential_flow_not_configured: 'Поток Resource Owner Password Credentials не настроен из-за ненастроенного Doorkeeper.configure.resource_owner_from_credentials.'
        resource_owner_authenticator_not_configured: 'Поиск владельца ресурса не удался из-за ненастроенного Doorkeeper.configure.resource_owner_authenticator.'
        admin_authenticator_not_configured: 'Доступ к админ-панели запрещён из-за ненастроенного Doorkeeper.configure.admin_authenticator.'

        # Ошибки предоставления доступа
        unsupported_response_type: 'Сервер авторизации не поддерживает этот тип ответа.'
        unsupported_response_mode: 'Сервер авторизации не поддерживает этот режим ответа.'

        # Ошибки токена доступа
        invalid_client: 'Аутентификация клиента не удалась из-за неизвестного клиента, отсутствия аутентификации клиента или неподдерживаемого метода аутентификации.'
        invalid_grant: 'Предоставленный грант авторизации недействителен, истёк, отозван, не соответствует URI перенаправления, использованному в запросе авторизации, или был выдан другому клиенту.'
        unsupported_grant_type: 'Тип гранта авторизации не поддерживается сервером авторизации.'

        invalid_token:
          revoked: "Токен доступа был отозван"
          expired: "Токен доступа истёк"
          unknown: "Токен доступа недействителен"
        revoke:
          unauthorized: "Вы не авторизованы для отзыва этого токена"

        forbidden_token:
