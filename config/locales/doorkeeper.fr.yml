    errors:
      messages:
        # Common error messages
        invalid_request:
          unknown: 'La requête manque un paramètre requis, inclut une valeur de paramètre non supportée, ou est mal formée.'
          missing_param: 'Paramètre requis manquant : %{value}.'
          request_not_authorized: 'La requête doit être autorisée. Le paramètre requis pour autoriser la requête est manquant ou invalide.'
          invalid_code_challenge: 'Le challenge de code (code challenge) est requis.'
        invalid_redirect_uri: "L'URI de redirection demandée est mal formée ou ne correspond pas à l'URI de redirection du client."
        unauthorized_client: 'Le client n''est pas autorisé à effectuer cette requête en utilisant cette méthode.'
        access_denied: 'Le propriétaire de la ressource ou le serveur d''autorisation a refusé la requête.'
        invalid_scope: 'La portée (scope) demandée est invalide, inconnue ou mal formée.'
        invalid_code_challenge_method:
          zero: 'Le serveur d''autorisation ne supporte pas PKCE car aucune valeur de code_challenge_method n''est acceptée.'
          one: 'Le code_challenge_method doit être %{challenge_methods}.'
          other: 'Le code_challenge_method doit être l''un des suivants : %{challenge_methods}.'
        server_error: 'Le serveur d''autorisation a rencontré une condition inattendue qui l''a empêché de satisfaire la requête.'
        temporarily_unavailable: 'Le serveur d''autorisation est actuellement incapable de traiter la requête en raison d''une surcharge temporaire ou d''une maintenance du serveur.'

        # Configuration error messages
        credential_flow_not_configured: 'Le flux Resource Owner Password Credentials a échoué car Doorkeeper.configure.resource_owner_from_credentials n''est pas configuré.'
        resource_owner_authenticator_not_configured: 'La recherche du propriétaire de la ressource a échoué car Doorkeeper.configure.resource_owner_authenticator n''est pas configuré.'
        admin_authenticator_not_configured: 'L''accès au panneau d''administration est interdit car Doorkeeper.configure.admin_authenticator n''est pas configuré.'

        # Access grant errors
        unsupported_response_type: 'Le serveur d''autorisation ne supporte pas ce type de réponse.'
        unsupported_response_mode: 'Le serveur d''autorisation ne supporte pas ce mode de réponse.'

        # Access token errors
        invalid_client: 'L''authentification du client a échoué (client inconnu, aucune authentification incluse, ou méthode d''authentification non supportée).'
        invalid_grant: 'L''autorisation fournie est invalide, expirée, révoquée, ne correspond pas à l''URI de redirection utilisée dans la requête d''autorisation, ou a été émise pour un autre client.'
        unsupported_grant_type: 'Le type d''autorisation n''est pas supporté par le serveur d''autorisation.'

        invalid_token:
          revoked: "Le jeton d'accès a été révoqué"
          expired: "Le jeton d'accès a expiré"
          unknown: "Le jeton d'accès est invalide"
        revoke:
          unauthorized: "Vous n'êtes pas autorisé à révoquer ce jeton"

        forbidden_token:
          missing_scope: 'L''accès à cette ressource nécessite la portée (scope) "%{oauth_scopes}".'

