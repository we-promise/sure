            seçeneklerini etkinleştirin.
          step_4: Sorguyu kaydedin, "Query ID"nizi not edin, ardından bir erişim Token'ı
            oluşturmak için "Flex Web Service Configuration" bölümündeki dişli simgesini
            kullanın.
          step_5: Sorgu ID'nizi ve Token'ınızı aşağıya yapıştırın, yapılandırmayı
            kaydedin, ardından keşfedilen IBKR hesaplarını bağlamak için Hesaplar'a
            gidin.
