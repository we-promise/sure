        context_window_label: Ventana de contexto (opcional)
        context_window_help: 'Total de tokens que aceptará el modelo. Predeterminado: 2048 — súbelo a 8192 o más para OpenAI en la nube o modelos locales de contexto grande.'
        max_response_tokens_label: Tokens máximos de respuesta (opcional)
        max_response_tokens_help: 'Tokens reservados para la respuesta del modelo. Predeterminado: 512. Bájalo para dejar sitio a un historial más largo.'
