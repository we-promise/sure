---
ru:
  defaults:
    brand_name: "%{brand_name}"
    product_name: "%{product_name}"
    common:
      close: "Закрыть"
  global:
    expand: "Развернуть"
  activerecord:
    errors:
      messages:
        record_invalid: 'Ошибка валидации: %{errors}'
        restrict_dependent_destroy:
          has_many: Невозможно удалить запись, так как существуют зависимые %{record}
          has_one: Невозможно удалить запись, так как существует зависимый %{record}
  date:
    abbr_day_names:
    - Вс
    - Пн
    - Вт
    - Ср
    - Чт
    - Пт
    - Сб
    abbr_month_names:
    -
    - Янв
    - Фев
    - Мар
    - Апр
    - Май
    - Июн
    - Июл
    - Авг
    - Сен
    - Окт
    - Ноя
    - Дек
    day_names:
    - Воскресенье
    - Понедельник
    - Вторник
    - Среда
    - Четверг
    - Пятница
    - Суббота
    formats:
      default: "%d.%m.%Y"
      long: "%d %B %Y"
      short: "%d %b"
      month_year: "%B %Y"
      short_month_year: "%b %Y"
    month_names:
    -
    - Январь
    - Февраль
    - Март
    - Апрель
    - Май
    - Июнь
    - Июль
    - Август
    - Сентябрь
    - Октябрь
    - Ноябрь
    - Декабрь
    order:
    - :year
    - :month
    - :day
  datetime:
    distance_in_words:
      about_x_hours:
        one: около %{count} часа
        other: около %{count} часов
      about_x_months:
        one: около %{count} месяца
        other: около %{count} месяцев
      about_x_years:
        one: около %{count} года
        other: около %{count} лет
      almost_x_years:
        one: почти %{count} год
        other: почти %{count} лет
      half_a_minute: полминуты
      less_than_x_minutes:
        one: менее минуты
        other: менее %{count} минут
      less_than_x_seconds:
        one: менее %{count} секунды
        other: менее %{count} секунд
      over_x_years:
        one: более %{count} года
        other: более %{count} лет
      x_days:
        one: "%{count} день"
        other: "%{count} дней"
      x_minutes:
        one: "%{count} минута"
        other: "%{count} минут"
      x_months:
        one: "%{count} месяц"
        other: "%{count} месяцев"
      x_seconds:
        one: "%{count} секунда"
        other: "%{count} секунд"
      x_years:
        one: "%{count} год"
        other: "%{count} лет"
    prompts:
      day: День
      hour: Час
      minute: Минута
      month: Месяц
      second: Секунда
      year: Год
  errors:
    format: "%{attribute} %{message}"
    messages:
      accepted: должно быть принято
      blank: не может быть пустым
      confirmation: не совпадает с %{attribute}
      empty: не может быть пустым
      equal_to: должно быть равно %{count}
      even: должно быть чётным
      exclusion: зарезервировано
      greater_than: должно быть больше %{count}
      greater_than_or_equal_to: должно быть больше или равно %{count}
      in: должно быть в %{count}
      inclusion: не включено в список
      invalid: недействительно
      less_than: должно быть меньше %{count}
      less_than_or_equal_to: должно быть меньше или равно %{count}
      model_invalid: 'Ошибка валидации: %{errors}'
      not_a_number: не является числом
      not_an_integer: должно быть целым числом
      odd: должно быть нечётным
      other_than: должно отличаться от %{count}
      present: должно быть пустым
      required: должно существовать
      taken: уже занято
      too_long:
        one: слишком длинное (максимум %{count} символ)
        other: слишком длинное (максимум %{count} символов)
      too_short:
        one: слишком короткое (минимум %{count} символ)
        other: слишком короткое (минимум %{count} символов)
      wrong_length:
        one: неправильная длина (должно быть %{count} символ)
        other: неправильная длина (должно быть %{count} символов)
    template:
      body: 'Возникли проблемы с следующими полями:'
      header:
        one: "%{count} ошибка не позволила сохранить %{model}"
        other: "%{count} ошибок не позволили сохранить %{model}"
  helpers:
    select:
      prompt: Пожалуйста, выберите
      search_placeholder: "Поиск"
      default_label: "Выбрать..."
    submit:
      create: Создать %{model}
      submit: Сохранить %{model}
      update: Обновить %{model}
  number:
    currency:
      format:
        significant: false
        strip_insignificant_zeros: false
    format:
      delimiter: " "
      precision: 3
      round_mode: default
      separator: ","
      significant: false
      strip_insignificant_zeros: false
    human:
      decimal_units:
        format: "%n %u"
        units:
          billion: Миллиард
          million:
            one: Миллион
            other: Миллионов
          quadrillion: Квадриллион
          thousand: Тысяча
          trillion:
            one: Триллион
            other: Триллионов
          unit: ''
      format:
        delimiter: ''
        precision: 3
        significant: true
        strip_insignificant_zeros: true
      storage_units:
        format: "%n %u"
        units:
          byte:
            one: Байт
            other: Байтов
          eb: ЭБ
          gb: ГБ
          kb: КБ
          mb: МБ
          pb: ПБ
          tb: ТБ
    percentage:
      format:
        delimiter: ''
        format: "%n%"
    precision:
      format:
        delimiter: ''
  support:
    array:
      last_word_connector: ", и "
      two_words_connector: " и "
      words_connector: ", "
  time:
    am: до полудня
    formats:
      default: "%a, %d %b %Y %H:%M:%S %z"
      long: "%d %B %Y %H:%M"
      short: "%d %b %H:%M"
    pm: после полудня
