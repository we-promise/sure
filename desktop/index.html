<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sure</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <main id="onboarding" class="onboarding" data-tauri-drag-region>
      <div class="card">
        <h1 id="title"></h1>
        <p id="subtitle" class="muted"></p>
        <form id="server-form">
          <input id="server-url" type="text" autocomplete="off" spellcheck="false" />
          <button id="connect" type="submit"></button>
        </form>
        <p id="status" class="status" role="status"></p>
        <section id="remembered" class="remembered hidden">
          <h2 id="remembered-title" class="muted"></h2>
          <ul id="server-list"></ul>
        </section>
      </div>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
