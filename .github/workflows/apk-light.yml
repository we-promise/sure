name: APK Light Build

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-android:
    name: Build Debug APK (Light)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.4'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Copy Sure icons from public/
        run: cp public/android-chrome-512x512.png mobile/assets/icon/app_icon.png

      - name: Generate app icons
        working-directory: mobile
        run: flutter pub run flutter_launcher_icons

      - name: Build Debug APK
        working-directory: mobile
        env:
          ALLOWED_ENV_EMAILS: ${{ secrets.ALLOWED_ENV_EMAILS }}
        run: flutter build apk --debug --dart-define=ALLOWED_ENV_EMAILS=${ALLOWED_ENV_EMAILS:-}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: mobile/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14
