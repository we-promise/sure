name: Desktop Release

# Push a version tag to build and publish a universal macOS .dmg to its own
# GitHub Release. The tag is the single source of truth for the version:
#   git tag desktop-v1.2.0 && git push origin desktop-v1.2.0
# builds an app reporting version 1.2.0. workflow_dispatch builds without
# publishing (for testing the pipeline).
on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest # Apple Silicon runner; cross-builds the x86_64 slice
    steps:
      - uses: actions/checkout@v4

      - name: Sync version from tag
        if: github.ref_type == 'tag'
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#desktop-v}"
          echo "Building version $VERSION from tag $GITHUB_REF_NAME"
          tmp="$(mktemp)"
          jq --arg v "$VERSION" '.version = $v' desktop/src-tauri/tauri.conf.json > "$tmp" && mv "$tmp" desktop/src-tauri/tauri.conf.json
          jq --arg v "$VERSION" '.version = $v' desktop/package.json > "$tmp" && mv "$tmp" desktop/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Install frontend dependencies
        working-directory: desktop
        run: npm ci

      # Builds the universal .dmg (unsigned) and, on a tag, creates a GitHub
      # Release and uploads the artifacts. tauri-action runs the configured
      # beforeBuildCommand (npm run build) itself.
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: "Sure Desktop ${{ github.ref_name }}"
          releaseBody: |
            Universal macOS build (Apple Silicon + Intel).

            **This build is unsigned.** On first launch macOS will block it. To open:
            1. Try to open Sure, then dismiss the warning.
            2. System Settings → Privacy & Security → scroll down → **Open Anyway** → confirm.

            If it says the app is "damaged", run once in Terminal:
            `xattr -cr /Applications/Sure.app`
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false
          args: --target universal-apple-darwin
