name: zh-CN Docker Build (Sure)

on:
  push:
    branches:
      - i18n/zh-cn-complete-1
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  i18n-validate:
    name: i18n YAML validate + missing report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate all zh-CN YAML files load
        run: |
          python3 - <<'PY'
          import glob, yaml, sys

          files = sorted(glob.glob('config/locales/**/zh-CN.yml', recursive=True))
          if not files:
              print('No zh-CN locale files found')
              sys.exit(1)

          bad = []
          for f in files:
              try:
                  with open(f, 'r', encoding='utf-8') as fp:
                      yaml.safe_load(fp)
              except Exception as e:
                  bad.append((f, str(e)))

          if bad:
              print('YAML load failures:')
              for f, e in bad:
                  print('-', f, e)
              sys.exit(1)

          print('OK:', len(files), 'zh-CN files')
          PY

      - name: Compute missing zh-CN keys (vs en.yml)
        run: |
          python3 - <<'PY'
          import glob, os, json, yaml

          def deep_flatten(obj, prefix=None, out=None):
              prefix = prefix or []
              out = out or {}
              if isinstance(obj, dict):
                  for k, v in obj.items():
                      deep_flatten(v, prefix + [str(k)], out)
              else:
                  out['.'.join(prefix)] = obj
              return out

          base = os.path.join('config', 'locales')
          en_files = sorted(glob.glob(os.path.join(base, '**', 'en.yml'), recursive=True))
          total = 0
          files_with_missing = []

          for en_path in en_files:
              zh_path = en_path[:-len('en.yml')] + 'zh-CN.yml'
              if not os.path.exists(zh_path):
                  continue

              en = yaml.safe_load(open(en_path, 'r', encoding='utf-8')) or {}
              zh = yaml.safe_load(open(zh_path, 'r', encoding='utf-8')) or {}

              en_root = en.get('en', en)
              zh_root = zh.get('zh-CN', zh)
              if not isinstance(en_root, dict) or not isinstance(zh_root, dict):
                  continue

              en_flat = deep_flatten(en_root)
              zh_flat = deep_flatten(zh_root)

              missing_count = 0
              for k, v in en_flat.items():
                  if v is None or isinstance(v, (int, float, bool)):
                      continue
                  if k not in zh_flat or zh_flat.get(k) in (None, ''):
                      missing_count += 1

              if missing_count:
                  files_with_missing.append((en_path, missing_count))
                  total += missing_count

          files_with_missing.sort(key=lambda x: x[1], reverse=True)
          out = {
              'total_missing': total,
              'files_with_missing': len(files_with_missing),
              'top_files': files_with_missing[:20],
          }

          print(json.dumps(out, ensure_ascii=False, indent=2))
          with open('i18n_missing_summary.json', 'w', encoding='utf-8') as fp:
              json.dump(out, fp, ensure_ascii=False, indent=2)
          PY

      - uses: actions/upload-artifact@v4
        with:
          name: i18n-missing-summary
          path: i18n_missing_summary.json

  docker-build:
    name: Build Docker image (push to GHCR on branch push)
    runs-on: ubuntu-latest
    needs: i18n-validate
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (PR)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          build-args: |
            BUILD_COMMIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push (branch)
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/sure:zhcn-i18n-${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/sure:zhcn-i18n-latest
          build-args: |
            BUILD_COMMIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
