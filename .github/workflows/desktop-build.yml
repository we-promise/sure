name: Desktop Build

# Builds the macOS desktop app and keeps a single always-current download.
# Runs ONLY when desktop code changes (path filter), so the published .dmg
# never changes unless the desktop app did. Publishes to a rolling
# "desktop-latest" prerelease with a stable filename (Sure.dmg), giving one
# permanent download URL:
#   https://github.com/<owner>/<repo>/releases/download/desktop-latest/Sure.dmg
on:
  push:
    branches: [main]
    paths:
      - "desktop/**"
      - ".github/workflows/desktop-build.yml"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: desktop-latest
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest # Apple Silicon runner; cross-builds the x86_64 slice
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Install frontend dependencies
        working-directory: desktop
        run: npm ci

      - name: Build universal .dmg (unsigned)
        working-directory: desktop
        run: npm run tauri build -- --target universal-apple-darwin

      - name: Stage stable-named artifact
        run: |
          set -euo pipefail
          dmg="$(ls desktop/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg | head -1)"
          cp "$dmg" Sure.dmg

      - name: Publish rolling "latest" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: desktop-latest
          name: Sure Desktop (latest)
          prerelease: true # keep it off the repo's "Latest release" badge (that's the app's v* release)
          files: Sure.dmg
          body: |
            Latest universal macOS build (Apple Silicon + Intel). Rebuilt only when `desktop/` changes.

            **This build is unsigned.** First launch is blocked by Gatekeeper. To open:
            1. Try to open Sure, then dismiss the warning.
            2. System Settings → Privacy & Security → scroll down → **Open Anyway** → confirm.

            If it says the app is "damaged", run once in Terminal:
            `xattr -cr /Applications/Sure.app`
